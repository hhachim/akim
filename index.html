<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Présent — recall</title>
<style>:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  margin: 0; padding: 1.5rem 1rem 4rem;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color: #1f2937; background: #f8fafc; line-height: 1.5;
}
main { max-width: 640px; margin: 0 auto; }
header { margin-bottom: 1.5rem; text-align: center; }
header h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
header p { margin: 0; color: #6b7280; font-size: .875rem; }
.progress { color: #6b7280; font-size: .875rem; text-align: right; margin-bottom: .5rem; }
.card {
  background: #fff; border: 1px solid #e5e7eb; border-radius: .75rem;
  padding: 1.25rem; box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.q { font-size: 1.2rem; font-weight: 600; margin: 0 0 1rem; white-space: pre-wrap; }
.hint { color: #6b7280; font-size: .875rem; margin: -.5rem 0 1rem; }
.reveal { background: #f1f5f9; border-radius: .5rem; padding: 1rem; margin: 1rem 0; white-space: pre-wrap; }
ul.answers { margin: .5rem 0 0; padding-left: 1.25rem; }
textarea {
  width: 100%; min-height: 7rem; padding: .75rem; border: 1px solid #cbd5e1;
  border-radius: .5rem; font: inherit; resize: vertical; margin-bottom: 1rem;
}
button {
  font: inherit; cursor: pointer; border-radius: .5rem; border: 1px solid transparent;
}
.btn {
  display: block; width: 100%; padding: .85rem 1rem; font-weight: 600;
  background: #4f46e5; color: #fff; margin-top: 1rem;
}
.btn:hover { background: #4338ca; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.opt {
  display: block; width: 100%; text-align: left; padding: .8rem 1rem; margin: .5rem 0;
  background: #fff; border: 1px solid #cbd5e1; color: #1f2937;
}
.opt:hover { border-color: #818cf8; }
.opt.sel { border-color: #4f46e5; background: #eef2ff; }
.opt.ok { border-color: #16a34a; background: #f0fdf4; }
.opt.ko { border-color: #dc2626; background: #fef2f2; }
.opt[disabled] { cursor: default; }
.verdict { font-weight: 600; margin: 1rem 0 0; }
.verdict.ok { color: #16a34a; }
.verdict.ko { color: #dc2626; }
.explanation {
  background: #f1f5f9; border-radius: .5rem; padding: .75rem; margin-top: .75rem;
  font-size: .9rem; white-space: pre-wrap;
}
.done { text-align: center; }
.done .emoji { font-size: 2.5rem; }
.score { font-size: 1.25rem; font-weight: 700; margin: 1rem 0; }</style>
</head>
<body>
<main>
<header>
<h1>Présent</h1>
<p>Quiz hors-ligne — généré par recall. Aucune connexion requise.</p>
</header>
<div id="app"></div>
</main>
<script id="recall-data" type="application/json">{"title":"Présent","cards":[{"type":"flashcard","position":0,"front":"Conjugue le verbe « être » au présent pour « nous ».","back":"nous sommes"},{"type":"flashcard","position":1,"front":"Quelle est la conjugaison de « être » au futur simple pour « il » ?","back":"il sera"},{"type":"flashcard","position":2,"front":"Comment conjugue-t-on « être » au passé simple pour « vous » ?","back":"vous fûtes"},{"type":"flashcard","position":3,"front":"Donne la conjugaison de « être » au plus-que-parfait pour « j' ».","back":"j'avais été"},{"type":"cloze","position":4,"maskedText":"Au passé composé, « ils » se conjugue : ils _____ été.","answers":[{"answer":"ont","hint":"auxiliaire avoir, 3e personne du pluriel, au présent"}]},{"type":"cloze","position":5,"maskedText":"Au futur antérieur, « nous » se conjugue : nous _____ été.","answers":[{"answer":"aurons","hint":"auxiliaire avoir au futur simple, 1re personne du pluriel"}]},{"type":"cloze","position":6,"maskedText":"À l'imparfait, « vous » se conjugue : vous _____.","answers":[{"answer":"étiez","hint":"imparfait, 2e personne du pluriel, pas d'auxiliaire"}]},{"type":"cloze","position":7,"maskedText":"Au passé antérieur, « il » se conjugue : il _____ été.","answers":[{"answer":"eut","hint":"auxiliaire avoir au passé simple, 3e personne du singulier"}]},{"type":"qcm","position":8,"question":"Quelles formes correspondent au présent du verbe « être » ?","options":["je fus / tu fus / il fut","je suis / tu es / il est","nous étions / vous étiez / ils étaient","nous sommes / vous êtes / ils sont"],"correctIndices":[1,3],"multi":true,"explanation":"« je suis / tu es / il est » et « nous sommes / vous êtes / ils sont » sont toutes les formes du présent. « je fus / tu fus / il fut » est le passé simple et « nous étions / vous étiez / ils étaient » est l'imparfait."},{"type":"qcm","position":9,"question":"Parmi ces temps, lesquels sont des temps composés (formés avec l'auxiliaire avoir + été) ?","options":["Présent","Passé composé","Imparfait","Plus-que-parfait","Futur antérieur","Passé simple"],"correctIndices":[1,3,4],"multi":true,"explanation":"Le passé composé (j'ai été), le plus-que-parfait (j'avais été) et le futur antérieur (j'aurai été) sont composés : ils utilisent l'auxiliaire « avoir » conjugué + le participe passé « été ». Le présent, l'imparfait et le passé simple sont des temps simples (un seul mot)."},{"type":"qcm","position":10,"question":"Quelle est la conjugaison correcte de « être » au passé simple pour « nous » ?","options":["nous étions","nous avons été","nous fûmes","nous serons"],"correctIndices":[2],"multi":true,"explanation":"Au passé simple, « nous » se conjugue « nous fûmes ». « nous étions » est l'imparfait, « nous avons été » est le passé composé et « nous serons » est le futur simple."},{"type":"qcm","position":11,"question":"Lesquelles de ces formes appartiennent au futur antérieur du verbe « être » ?","options":["je serai","tu auras été","il sera","vous aurez été","nous aurons été"],"correctIndices":[1,3,4],"multi":true,"explanation":"« tu auras été », « vous aurez été » et « nous aurons été » sont au futur antérieur (auxiliaire avoir au futur simple + été). « je serai » et « il sera » sont au futur simple, un temps sans auxiliaire."},{"type":"explain","position":12,"prompt":"Explique comment reconnaître qu'un temps du verbe « être » est composé, en t'appuyant sur les formes « j'ai été » et « j'avais été » tirées du texte.","modelAnswer":"Un temps composé est formé de deux mots : un auxiliaire (ici « avoir » conjugué) suivi du participe passé « été ». Dans « j'ai été » (passé composé), l'auxiliaire est « ai » (avoir au présent). Dans « j'avais été » (plus-que-parfait), l'auxiliaire est « avais » (avoir à l'imparfait). On reconnaît donc un temps composé au fait qu'il y a toujours le mot « été » précédé d'une forme d'« avoir ».","rubric":"Identifier les deux éléments d'un temps composé (auxiliaire avoir + été) ; nommer l'auxiliaire dans chaque exemple cité ; distinguer temps composé (deux mots) et temps simple (un seul mot)."},{"type":"explain","position":13,"prompt":"Compare les formes « j'étais » (imparfait) et « j'avais été » (plus-que-parfait) : laquelle est un temps simple, laquelle est un temps composé, et comment le sais-tu ?","modelAnswer":"« j'étais » est un temps simple : il n'y a qu'un seul mot, sans auxiliaire. « j'avais été » est un temps composé : il est formé de deux mots, l'auxiliaire « avoir » à l'imparfait (« avais ») suivi du participe passé « été ». La présence de « été » après une forme d'« avoir » est la marque d'un temps composé.","rubric":"Identifier « j'étais » comme temps simple et « j'avais été » comme temps composé ; justifier en nommant l'auxiliaire (avais) et le participe passé (été) dans le temps composé."},{"type":"explain","position":14,"prompt":"Explique comment se forme le passé antérieur du verbe « être » en t'appuyant sur la conjugaison pour « tu » tirée du texte.","modelAnswer":"Le passé antérieur est un temps composé. Il se forme avec l'auxiliaire « avoir » conjugué au passé simple + le participe passé « été ». Pour « tu », l'auxiliaire « avoir » au passé simple donne « eus », puis on ajoute « été » : on obtient « tu eus été ». On remarque que c'est la même structure que le passé composé, mais l'auxiliaire est au passé simple au lieu d'être au présent.","rubric":"Donner la forme exacte « tu eus été » ; identifier l'auxiliaire avoir au passé simple (eus) et le participe passé (été) ; noter que c'est un temps composé."},{"type":"explain","position":15,"prompt":"Compare le passé simple et le passé antérieur du verbe « être » pour « ils » : donne chaque forme, puis explique la différence de construction.","modelAnswer":"Au passé simple, « ils » se conjugue « ils furent » : c'est un temps simple, un seul mot. Au passé antérieur, « ils » se conjugue « ils eurent été » : c'est un temps composé, formé de l'auxiliaire « avoir » au passé simple (« eurent ») suivi du participe passé « été ». Le passé antérieur a donc deux mots de plus que le passé simple.","rubric":"Donner « ils furent » pour le passé simple et « ils eurent été » pour le passé antérieur ; distinguer temps simple (un mot) et temps composé (deux mots) ; nommer l'auxiliaire (eurent) et le participe passé (été) dans le passé antérieur."}]}</script>
<script>(function () {
  var data = JSON.parse(document.getElementById('recall-data').textContent);
  var cards = (data && data.cards) || [];
  var app = document.getElementById('app');
  var idx = 0;
  var qcmScores = [];

  function scoreQcmMulti(selected, correct) {
    if (!correct.length) return 0;
    var c = {}, s = {};
    correct.forEach(function (i) { c[i] = true; });
    selected.forEach(function (i) { s[i] = true; });
    var good = 0, bad = 0;
    Object.keys(s).forEach(function (k) { if (c[k]) good++; else bad++; });
    var ratio = (good - bad) / correct.length;
    return Math.round(Math.max(0, Math.min(1, ratio)) * 100);
  }

  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }

  function clear() { while (app.firstChild) app.removeChild(app.firstChild); }

  function btn(label, cls, onClick) {
    var b = el('button', cls || 'btn', label);
    b.addEventListener('click', onClick);
    return b;
  }

  function render() {
    clear();
    if (idx >= cards.length) return renderDone();
    var card = cards[idx];
    var p = el('p', 'progress', (idx + 1) + ' / ' + cards.length);
    app.appendChild(p);
    var box = el('section', 'card');
    app.appendChild(box);
    if (card.type === 'flashcard') renderReveal(box, card.front, card.back);
    else if (card.type === 'cloze') renderCloze(box, card);
    else if (card.type === 'qcm') renderQcm(box, card);
    else if (card.type === 'explain') renderExplain(box, card);
    else next();
  }

  function next() { idx++; render(); }

  function renderReveal(box, question, answer) {
    box.appendChild(el('p', 'q', question));
    var reveal = btn('Révéler', 'btn', function () {
      reveal.remove();
      box.appendChild(el('div', 'reveal', answer));
      box.appendChild(btn('Suivant', 'btn', next));
    });
    box.appendChild(reveal);
  }

  function renderCloze(box, card) {
    box.appendChild(el('p', 'q', card.maskedText));
    var reveal = btn('Révéler', 'btn', function () {
      reveal.remove();
      var wrap = el('div', 'reveal');
      wrap.appendChild(el('p', null, (card.answers.length > 1 ? 'Réponses :' : 'Réponse :')));
      var ul = el('ul', 'answers');
      card.answers.forEach(function (a) {
        ul.appendChild(el('li', null, a.answer + (a.hint ? ' (' + a.hint + ')' : '')));
      });
      wrap.appendChild(ul);
      box.appendChild(wrap);
      box.appendChild(btn('Suivant', 'btn', next));
    });
    box.appendChild(reveal);
  }

  function renderQcm(box, card) {
    box.appendChild(el('p', 'q', card.question));
    if (card.multi) box.appendChild(el('p', 'hint', 'Plusieurs réponses possibles.'));
    var selected = [];
    var validated = false;
    var optButtons = [];
    var validateBtn = null;

    function validate() {
      if (validated) return;
      validated = true;
      var score = scoreQcmMulti(selected, card.correctIndices);
      qcmScores.push(score);
      optButtons.forEach(function (b, i) {
        b.disabled = true;
        var isAnswer = card.correctIndices.indexOf(i) !== -1;
        var isSel = selected.indexOf(i) !== -1;
        b.classList.remove('sel');
        if (isAnswer) b.classList.add('ok');
        else if (isSel) b.classList.add('ko');
      });
      if (validateBtn) validateBtn.remove();
      var perfect = score === 100;
      var v = el('p', 'verdict ' + (perfect ? 'ok' : 'ko'),
        perfect ? 'Bonne réponse !' : 'Pas tout à fait (' + score + '%).');
      box.appendChild(v);
      if (card.explanation) {
        box.appendChild(el('p', 'explanation', (perfect ? '' : 'Pourquoi : ') + card.explanation));
      }
      box.appendChild(btn('Suivant', 'btn', next));
    }

    card.options.forEach(function (opt, i) {
      var b = el('button', 'opt', opt);
      b.addEventListener('click', function () {
        if (validated) return;
        if (card.multi) {
          var pos = selected.indexOf(i);
          if (pos === -1) { selected.push(i); b.classList.add('sel'); }
          else { selected.splice(pos, 1); b.classList.remove('sel'); }
        } else {
          selected = [i];
          b.classList.add('sel');
          validate();
        }
      });
      optButtons.push(b);
      box.appendChild(b);
    });

    if (card.multi) {
      validateBtn = btn('Valider', 'btn', validate);
      box.appendChild(validateBtn);
    }
  }

  function renderExplain(box, card) {
    box.appendChild(el('p', 'q', card.prompt));
    var ta = el('textarea');
    ta.placeholder = 'Écris ta réponse avec tes mots…';
    box.appendChild(ta);
    var reveal = btn('Voir la réponse modèle', 'btn', function () {
      reveal.remove();
      ta.disabled = true;
      var wrap = el('div', 'reveal');
      wrap.appendChild(el('p', null, 'Réponse modèle :'));
      wrap.appendChild(el('p', null, card.modelAnswer));
      if (card.rubric) wrap.appendChild(el('p', 'hint', 'Critères : ' + card.rubric));
      box.appendChild(wrap);
      box.appendChild(btn('Suivant', 'btn', next));
    });
    box.appendChild(reveal);
  }

  function renderDone() {
    var box = el('section', 'card done');
    box.appendChild(el('p', 'emoji', '🎉'));
    box.appendChild(el('p', 'q', 'Terminé !'));
    if (qcmScores.length) {
      var avg = Math.round(qcmScores.reduce(function (a, b) { return a + b; }, 0) / qcmScores.length);
      box.appendChild(el('p', 'score', 'Score QCM moyen : ' + avg + '%'));
    }
    box.appendChild(btn('Recommencer', 'btn', function () {
      idx = 0; qcmScores = []; render();
    }));
    app.appendChild(box);
  }

  render();
})();</script>
</body>
</html>
