<style>:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  margin: 0; padding: 1.5rem 1rem 4rem;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  color: #1f2937; background: #f8fafc; line-height: 1.5;
}
main { max-width: 640px; margin: 0 auto; }
header { margin-bottom: 1.5rem; text-align: center; }
header h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
header p { margin: 0; color: #6b7280; font-size: .875rem; }
.progress { color: #6b7280; font-size: .875rem; text-align: right; margin-bottom: .5rem; }
.section { color: #4f46e5; font-weight: 700; font-size: .8rem; text-transform: uppercase; letter-spacing: .03em; margin: 0 0 .25rem; }
.card {
  background: #fff; border: 1px solid #e5e7eb; border-radius: .75rem;
  padding: 1.25rem; box-shadow: 0 1px 2px rgba(0,0,0,.04);
}
.q { font-size: 1.2rem; font-weight: 600; margin: 0 0 1rem; white-space: pre-wrap; }
.hint { color: #6b7280; font-size: .875rem; margin: -.5rem 0 1rem; }
.reveal { background: #f1f5f9; border-radius: .5rem; padding: 1rem; margin: 1rem 0; white-space: pre-wrap; }
ul.answers { margin: .5rem 0 0; padding-left: 1.25rem; }
textarea {
  width: 100%; min-height: 7rem; padding: .75rem; border: 1px solid #cbd5e1;
  border-radius: .5rem; font: inherit; resize: vertical; margin-bottom: 1rem;
}
button {
  font: inherit; cursor: pointer; border-radius: .5rem; border: 1px solid transparent;
}
.btn {
  display: block; width: 100%; padding: .85rem 1rem; font-weight: 600;
  background: #4f46e5; color: #fff; margin-top: 1rem;
}
.btn:hover { background: #4338ca; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.opt {
  display: block; width: 100%; text-align: left; padding: .8rem 1rem; margin: .5rem 0;
  background: #fff; border: 1px solid #cbd5e1; color: #1f2937;
}
.opt:hover { border-color: #818cf8; }
.opt.sel { border-color: #4f46e5; background: #eef2ff; }
.opt.ok { border-color: #16a34a; background: #f0fdf4; }
.opt.ko { border-color: #dc2626; background: #fef2f2; }
.opt[disabled] { cursor: default; }
.verdict { font-weight: 600; margin: 1rem 0 0; }
.verdict.ok { color: #16a34a; }
.verdict.ko { color: #dc2626; }
.explanation {
  background: #f1f5f9; border-radius: .5rem; padding: .75rem; margin-top: .75rem;
  font-size: .9rem; white-space: pre-wrap;
}
.done { text-align: center; }
.done .emoji { font-size: 2.5rem; }
.score { font-size: 1.25rem; font-weight: 700; margin: 1rem 0; }</style>
</head>
<body>
<main>
<header>

<script id="recall-data" type="application/json">{"title":"Gestion des clients - Sujet 2","cards":[{"type":"cloze","position":12,"maskedText":"_____.","answers":[{"answer":"Bonjour"}]},{"type":"cloze","position":13,"maskedText":"_____ : vous entrez dans un magasin Decathlon.","answers":[{"answer":"Imaginez"}]},{"type":"cloze","position":14,"maskedText":"En _____, vous trouvez la paire de crampons que vous cherchez, à votre taille, en rayon.","answers":[{"answer":"quelques secondes"}]},{"type":"cloze","position":15,"maskedText":"_____ de la chance.","answers":[{"answer":"Ce n'est pas"}]},{"type":"cloze","position":16,"maskedText":"Derrière ce _____, il y a un système d'information puissant qui travaille en silence.","answers":[{"answer":"moment tout simple"}]},{"type":"cloze","position":17,"maskedText":"La question à laquelle je vais répondre est la suivante : en quoi l'_____ permet-elle à Decathlon de fidéliser ses clients face à la concurrence du commerce en ligne ?","answers":[{"answer":"exploitation des données numériques"}]},{"type":"cloze","position":18,"maskedText":"Je vais _____ présenter Decathlon et son système d'information.","answers":[{"answer":"d'abord"}]},{"type":"cloze","position":19,"maskedText":"Puis je _____ comment les données l'aident à garder ses clients fidèles.","answers":[{"answer":"montrerai"}]},{"type":"cloze","position":20,"maskedText":"Decathlon, _____ connaît.","answers":[{"answer":"tout le monde"}]},{"type":"cloze","position":21,"maskedText":"C'est le _____ de la distribution d'articles de sport.","answers":[{"answer":"leader français"}]},{"type":"cloze","position":22,"maskedText":"L'entreprise crée ses propres marques — _____ pour le football, _____ pour la randonnée, _____ pour le fitness — et les vend dans ses magasins comme sur Internet.","answers":[{"answer":"Kipsta"},{"answer":"Quechua"},{"answer":"Domyos"}]},{"type":"cloze","position":23,"maskedText":"Pour gérer des _____ et des millions de clients, Decathlon ne peut pas tout faire à la main.","answers":[{"answer":"milliers de produits"}]},{"type":"cloze","position":24,"maskedText":"Elle s'appuie sur un _____ : son système d'information.","answers":[{"answer":"outil central"}]},{"type":"cloze","position":25,"maskedText":"Alors, ce _____, comment marche-t-il ?","answers":[{"answer":"système d'information"}]},{"type":"cloze","position":26,"maskedText":"_____, il y a une immense base de données.","answers":[{"answer":"Au cœur"}]},{"type":"cloze","position":27,"maskedText":"C'est comme un grand _____ où sont rangées toutes les informations de l'entreprise.","answers":[{"answer":"classeur numérique"}]},{"type":"cloze","position":28,"maskedText":"Cette base est _____ par quatre sources.","answers":[{"answer":"nourrie en permanence"}]},{"type":"cloze","position":29,"maskedText":"_____ : les puces RFID.","answers":[{"answer":"Première source"}]},{"type":"cloze","position":30,"maskedText":"Chaque article a une petite _____ qui s'identifie toute seule, sans contact.","answers":[{"answer":"étiquette électronique"}]},{"type":"cloze","position":31,"maskedText":"_____ : l'application mobile.","answers":[{"answer":"Deuxième source"}]},{"type":"cloze","position":32,"maskedText":"_____ : la carte de fidélité, qui enregistre les achats.","answers":[{"answer":"Troisième source"}]},{"type":"cloze","position":33,"maskedText":"_____ : toutes les ventes, en magasin et en ligne.","answers":[{"answer":"Quatrième source"}]},{"type":"cloze","position":34,"maskedText":"Toutes ces _____ arrivent dans la même base.","answers":[{"answer":"données"}]},{"type":"cloze","position":35,"maskedText":"Elles sont _____, car ce sont parfois des données personnelles.","answers":[{"answer":"collectées, traitées et sécurisées"}]},{"type":"cloze","position":36,"maskedText":"Et cette base va _____ à des choses très concrètes.","answers":[{"answer":"servir"}]},{"type":"cloze","position":37,"maskedText":"_____ de cette base de données : se rapprocher des clients et les fidéliser.","answers":[{"answer":"Première utilité"}]},{"type":"cloze","position":38,"maskedText":"Aujourd'hui, un client peut _____ sur Internet.","answers":[{"answer":"tout acheter"}]},{"type":"cloze","position":39,"maskedText":"Pour _____, Decathlon doit lui offrir mieux.","answers":[{"answer":"le garder"}]},{"type":"cloze","position":40,"maskedText":"Et c'est là que les _____ entrent en jeu.","answers":[{"answer":"données"}]},{"type":"cloze","position":41,"maskedText":"Je vous _____ en quatre points.","answers":[{"answer":"l'explique"}]},{"type":"cloze","position":42,"maskedText":"_____ : l'application.","answers":[{"answer":"Premier point"}]},{"type":"cloze","position":43,"maskedText":"Grâce aux _____, l'application dit au client si le produit est disponible dans son magasin.","answers":[{"answer":"données de stock"}]},{"type":"cloze","position":44,"maskedText":"Il peut même _____ et venir le retirer : c'est le click and collect.","answers":[{"answer":"commander en ligne"}]},{"type":"cloze","position":45,"maskedText":"_____ point : la carte de fidélité.","answers":[{"answer":"Deuxième"}]},{"type":"cloze","position":46,"maskedText":"Elle _____ les achats.","answers":[{"answer":"enregistre"}]},{"type":"cloze","position":47,"maskedText":"Decathlon connaît donc les _____ du client, et lui envoie des offres personnalisées qui l'intéressent vraiment, au lieu de publicités au hasard.","answers":[{"answer":"sports préférés"}]},{"type":"cloze","position":48,"maskedText":"_____ point : un parcours sans coupure.","answers":[{"answer":"Troisième"}]},{"type":"cloze","position":49,"maskedText":"Le client passe du _____ et d'Internet au magasin sans difficulté.","answers":[{"answer":"magasin à Internet"}]},{"type":"cloze","position":50,"maskedText":"On _____ l'omnicanal.","answers":[{"answer":"appelle cela"}]},{"type":"cloze","position":51,"maskedText":"_____, Decathlon le reconnaît.","answers":[{"answer":"Où qu'il aille"}]},{"type":"cloze","position":52,"maskedText":"_____ point : la confiance.","answers":[{"answer":"Quatrième"}]},{"type":"cloze","position":53,"maskedText":"Les _____ et un service après-vente rapide rassurent et donnent envie de revenir.","answers":[{"answer":"avis des clients en ligne"}]},{"type":"cloze","position":54,"maskedText":"Dans ces _____, ce sont les données qui créent une relation personnelle.","answers":[{"answer":"quatre cas"}]},{"type":"cloze","position":55,"maskedText":"Et un client qui se sent _____ est un client qui reste fidèle.","answers":[{"answer":"reconnu"}]},{"type":"cloze","position":56,"maskedText":"Et si tout cela est possible, c'est grâce au même _____.","answers":[{"answer":"système d'information"}]},{"type":"cloze","position":57,"maskedText":"Ces données servent aussi, _____, à gérer les stocks : éviter les ruptures, mettre le bon produit dans le bon magasin.","answers":[{"answer":"en coulisses"}]},{"type":"cloze","position":58,"maskedText":"Bien gérer _____, c'est aussi mieux servir le client.","answers":[{"answer":"en interne"}]},{"type":"cloze","position":59,"maskedText":"Pour conclure : en exploitant ses _____, Decathlon ne se contente pas de vendre.","answers":[{"answer":"données numériques"}]},{"type":"cloze","position":60,"maskedText":"L'entreprise crée une _____ avec chaque client : le bon produit, la bonne offre, au bon moment.","answers":[{"answer":"vraie relation"}]},{"type":"cloze","position":61,"maskedText":"C'est ce qui lui permet de _____, même face aux géants de la vente en ligne.","answers":[{"answer":"garder ses clients fidèles"}]},{"type":"cloze","position":62,"maskedText":"Et finalement, tout repose sur _____ : la donnée.","answers":[{"answer":"une seule richesse"}]},{"type":"cloze","position":63,"maskedText":"Je _____ remercie.","answers":[{"answer":"vous"}]}]}</script>
<script>(function () {
  var data = JSON.parse(document.getElementById('recall-data').textContent);
  var cards = (data && data.cards) || [];
  var app = document.getElementById('app');
  var idx = 0;
  var qcmScores = [];
  var LABELS = { cloze: 'Textes à trous', qcm: 'QCM', explain: 'Réponses libres', flashcard: 'Flashcards' };
  var typeSet = {};
  cards.forEach(function (c) { typeSet[c.type] = 1; });
  var multiType = Object.keys(typeSet).length > 1;

  function scoreQcmMulti(selected, correct) {
    if (!correct.length) return 0;
    var c = {}, s = {};
    correct.forEach(function (i) { c[i] = true; });
    selected.forEach(function (i) { s[i] = true; });
    var good = 0, bad = 0;
    Object.keys(s).forEach(function (k) { if (c[k]) good++; else bad++; });
    var ratio = (good - bad) / correct.length;
    return Math.round(Math.max(0, Math.min(1, ratio)) * 100);
  }

  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }

  function clear() { while (app.firstChild) app.removeChild(app.firstChild); }

  function btn(label, cls, onClick) {
    var b = el('button', cls || 'btn', label);
    b.addEventListener('click', onClick);
    return b;
  }

  function render() {
    clear();
    if (idx >= cards.length) return renderDone();
    var card = cards[idx];
    if (multiType) app.appendChild(el('p', 'section', LABELS[card.type] || ''));
    var p = el('p', 'progress', (idx + 1) + ' / ' + cards.length);
    app.appendChild(p);
    var box = el('section', 'card');
    app.appendChild(box);
    if (card.type === 'flashcard') renderReveal(box, card.front, card.back);
    else if (card.type === 'cloze') renderCloze(box, card);
    else if (card.type === 'qcm') renderQcm(box, card);
    else if (card.type === 'explain') renderExplain(box, card);
    else next();
  }

  function next() { idx++; render(); }

  function renderReveal(box, question, answer) {
    box.appendChild(el('p', 'q', question));
    var reveal = btn('Révéler', 'btn', function () {
      reveal.remove();
      box.appendChild(el('div', 'reveal', answer));
      box.appendChild(btn('Suivant', 'btn', next));
    });
    box.appendChild(reveal);
  }

  function renderCloze(box, card) {
    box.appendChild(el('p', 'q', card.maskedText));
    var reveal = btn('Révéler', 'btn', function () {
      reveal.remove();
      var wrap = el('div', 'reveal');
      wrap.appendChild(el('p', null, (card.answers.length > 1 ? 'Réponses :' : 'Réponse :')));
      var ul = el('ul', 'answers');
      card.answers.forEach(function (a) {
        ul.appendChild(el('li', null, a.answer + (a.hint ? ' (' + a.hint + ')' : '')));
      });
      wrap.appendChild(ul);
      box.appendChild(wrap);
      box.appendChild(btn('Suivant', 'btn', next));
    });
    box.appendChild(reveal);
  }

  function renderQcm(box, card) {
    box.appendChild(el('p', 'q', card.question));
    if (card.multi) box.appendChild(el('p', 'hint', 'Plusieurs réponses possibles.'));
    var selected = [];
    var validated = false;
    var optButtons = [];
    var validateBtn = null;

    function validate() {
      if (validated) return;
      validated = true;
      var score = scoreQcmMulti(selected, card.correctIndices);
      qcmScores.push(score);
      optButtons.forEach(function (b, i) {
        b.disabled = true;
        var isAnswer = card.correctIndices.indexOf(i) !== -1;
        var isSel = selected.indexOf(i) !== -1;
        b.classList.remove('sel');
        if (isAnswer) b.classList.add('ok');
        else if (isSel) b.classList.add('ko');
      });
      if (validateBtn) validateBtn.remove();
      var perfect = score === 100;
      var v = el('p', 'verdict ' + (perfect ? 'ok' : 'ko'),
        perfect ? 'Bonne réponse !' : 'Pas tout à fait (' + score + '%).');
      box.appendChild(v);
      if (card.explanation) {
        box.appendChild(el('p', 'explanation', (perfect ? '' : 'Pourquoi : ') + card.explanation));
      }
      box.appendChild(btn('Suivant', 'btn', next));
    }

    card.options.forEach(function (opt, i) {
      var b = el('button', 'opt', opt);
      b.addEventListener('click', function () {
        if (validated) return;
        if (card.multi) {
          var pos = selected.indexOf(i);
          if (pos === -1) { selected.push(i); b.classList.add('sel'); }
          else { selected.splice(pos, 1); b.classList.remove('sel'); }
        } else {
          selected = [i];
          b.classList.add('sel');
          validate();
        }
      });
      optButtons.push(b);
      box.appendChild(b);
    });

    if (card.multi) {
      validateBtn = btn('Valider', 'btn', validate);
      box.appendChild(validateBtn);
    }
  }

  function renderExplain(box, card) {
    box.appendChild(el('p', 'q', card.prompt));
    var ta = el('textarea');
    ta.placeholder = 'Écris ta réponse avec tes mots…';
    box.appendChild(ta);
    var reveal = btn('Voir la réponse modèle', 'btn', function () {
      reveal.remove();
      ta.disabled = true;
      var wrap = el('div', 'reveal');
      wrap.appendChild(el('p', null, 'Réponse modèle :'));
      wrap.appendChild(el('p', null, card.modelAnswer));
      if (card.rubric) wrap.appendChild(el('p', 'hint', 'Critères : ' + card.rubric));
      box.appendChild(wrap);
      box.appendChild(btn('Suivant', 'btn', next));
    });
    box.appendChild(reveal);
  }

  function renderDone() {
    var box = el('section', 'card done');
    box.appendChild(el('p', 'emoji', '🎉'));
    box.appendChild(el('p', 'q', 'Terminé !'));
    if (qcmScores.length) {
      var avg = Math.round(qcmScores.reduce(function (a, b) { return a + b; }, 0) / qcmScores.length);
      box.appendChild(el('p', 'score', 'Score QCM moyen : ' + avg + '%'));
    }
    box.appendChild(btn('Recommencer', 'btn', function () {
      idx = 0; qcmScores = []; render();
    }));
    app.appendChild(box);
  }

  render();
})();</script>
</body>
